site_name: Quantum Blue Server
site_description: Documentation Hub - Rules, Procedures, and Guidelines
site_url: https://quantumblue.gay

theme:
  name: material
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Rules:
      - Overview: rules/index.md
      - Community Rules: rules/community-rules.md
      - Game Rules: rules/game-rules.md
      - Role Guidelines: rules/role-rules.md
      - Silicon Rules: rules/silicon-rules.md
  - SOP & Space Law:
      - Overview: sop/index.md
      - Alert Procedure: rules/alert-procedure.md
      - Space Law: sop/spacelaw.md
      - Standard Operating Procedure: sop/sop.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

extra_css: []
extra_javascript: []

docs_dir: docs
site_dir: site